<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --accent-blue: #32a6ff;
            --blue-gradient: linear-gradient(180deg, #32a6ff 0%, #0076d1 100%);
            --dark-blue: #1a2a40;
            --text-main: #ffffff;
            --text-dim: #888888;
            --ton-blue: #0088cc;
            --status-green: #2ecc71;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 15px 0;
            -webkit-user-select: none;
            user-select: none;
        }

        .header-panel {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }

        .back-button {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid #222;
            box-shadow: 0 4px 0 #111;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .back-button:active {
            background: rgba(255,255,255,0.15);
            transform: translateY(4px);
            box-shadow: 0 0px 0 #111;
        }
        .back-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-arrow svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--status-green);
        }

        .balance-panel {
            background: #111;
            padding: 4px 4px 4px 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #222;
        }

        .ton-icon {
            width: 24px;
            height: 24px;
            background: var(--ton-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ton-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .balance-amount {
            font-weight: 800;
            font-size: 16px;
        }

        .add-funds-btn {
            width: 34px;
            height: 34px;
            background: var(--blue-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(50, 166, 255, 0.3);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .add-funds-btn:active {
            transform: scale(0.9);
        }

        .app-container {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-screen {
            height: 250px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .multiplier {
            position: absolute;
            left: 25px;
            top: 30%;
            font-size: 54px;
            font-weight: 900;
            z-index: 10;
        }

        #loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
            width: 75%;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d90ff, #78c5ff);
            box-shadow: 0 0 15px rgba(50, 166, 255, 0.6);
        }

        .waiting-text {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            color: #ffffff;
        }

        .rocket-container {
            position: absolute;
            right: 10px;
            bottom: 20px;
            width: 180px;
            height: 180px;
            z-index: 5;
            transform: translateY(300px);
            opacity: 0;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
        }

        .rocket-on-position {
            transform: translateY(0);
            opacity: 1;
        }

        .rocket-active-pulse {
            animation: rocket-pulse 0.4s infinite alternate ease-in-out;
        }

        @keyframes rocket-pulse {
            from { transform: scale(1); filter: drop-shadow(0 0 0px rgba(50, 166, 255, 0)); }
            to { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(50, 166, 255, 0.4)); }
        }

        .rocket-fly-away {
            transform: translate(400px, -600px) rotate(-35deg) scale(1.8) !important;
            opacity: 0 !important;
            transition: transform 1.8s ease-in, opacity 0.8s !important;
        }

        .history {
            display: flex;
            gap: 8px;
            overflow-x: hidden;
            height: 35px;
            align-items: center;
        }

        .hist-item {
            background: #1a1a1a;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            color: #888;
            min-width: fit-content;
        }

        .hist-item.active-now {
            background: linear-gradient(135deg, #0051ff, #002b85);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 81, 255, 0.4);
            animation: pulse-active 1.5s infinite;
        }

        @keyframes pulse-active {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .auto-controls {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 5px;
            padding-right: 5px;
        }

        .auto-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }

        .auto-checkbox input {
            display: none;
        }

        .auto-checkbox .checkmark {
            width: 14px;
            height: 14px;
            border: 2px solid #555;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .auto-checkbox input:checked + .checkmark {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .auto-checkbox input:checked + .checkmark::after {
            content: '';
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-top: -2px;
        }

        .auto-checkbox.active-text {
            color: var(--accent-blue);
        }

        .bet-button {
            background: linear-gradient(180deg, #1e88e5 0%, #1976d2 100%);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 17px;
            letter-spacing: 0.2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.5);
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bet-button.cashout-mode {
            background: linear-gradient(180deg, #ff9800 0%, #f57c00 100%);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.5);
        }
        
        .bet-button.disabled {
            background: #444; color: #888; box-shadow: none; cursor: not-allowed; pointer-events: none;
        }

        .bets-label {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 700;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .users-list {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 5px 15px;
            min-height: 200px;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e1e1e;
            transition: background-color 0.2s ease;
        }
        
        .user-row.self-row {
            background-color: rgba(50, 166, 255, 0.08);
            border-radius: 8px;
            padding: 12px 8px;
            margin: 4px -8px;
        }

        .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-profit {
            color: var(--text-main);
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .ton-mini-icon {
            width: 14px;
            height: 14px;
        }

        .lost-text {
            color: #ff4444 !important;
            opacity: 0.8;
        }

        .win-text {
            color: #2ecc71 !important;
        }

        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100;
            display: none; opacity: 0; transition: opacity 0.3s;
        }
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #181818; border-radius: 24px 24px 0 0;
            z-index: 101; transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; padding: 12px 20px 30px; box-sizing: border-box;
        }
        .bottom-sheet.open { bottom: 0; }
        .sheet-handle {
            width: 40px; height: 4px; background: #3a3a3c;
            border-radius: 2px; margin: 0 auto 20px;
        }
        .sheet-title {
            text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #fff;
        }
        
        .bet-amount-card {
            background: #121212; border-radius: 16px; padding: 15px; margin-bottom: 15px; position: relative;
        }
        .bet-amount-header {
            display: flex; justify-content: space-between; color: #666; font-size: 13px; font-weight: 600; margin-bottom: 10px;
        }
        .bet-amount-input {
            background: transparent; border: none; color: #fff; font-size: 36px; font-weight: 800;
            width: 80%; outline: none; font-family: 'Inter', sans-serif;
        }
        .bet-amount-input::placeholder { color: #333; }
        .bet-amount-currency {
            position: absolute; bottom: 18px; right: 15px; color: #666; font-weight: 700; font-size: 15px;
        }
        
        .quick-amounts {
            display: flex; gap: 8px; margin-bottom: 25px;
        }
        .quick-btn {
            flex: 1; background: #121212; color: #fff; border: none; padding: 12px 0;
            border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        .quick-btn:active { background: #222; }
        
        .sheet-submit-btn {
            background: #32a6ff; color: #ffffff; border: none; padding: 16px; border-radius: 14px;
            font-weight: 800; font-size: 17px; cursor: pointer; width: 100%;
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 340px;
        }
        .toast {
            background: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.3s, transform 0.3s;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast-btn {
            background: #32a6ff;
            color: #fff;
            text-decoration: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="header-panel">
    <div class="back-button" id="back-button">
        <span class="back-arrow">
            <svg viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </span>
        <span>Назад</span>
    </div>
    <div class="online-indicator">
        <div class="dot"></div>
        <span id="online-count">11</span>
    </div>
    <div class="balance-panel">
        <div class="ton-icon">
            <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" alt="TON">
        </div>
        <div class="balance-amount" id="header-balance">0.00</div>
        <div class="add-funds-btn">+</div>
    </div>
</div>
<div class="app-container">
    <div class="game-screen">
        <div class="grid"></div>
        <div class="multiplier" id="counter">x1.00</div>
        <div id="loading-overlay">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <div class="waiting-text">Ожидание</div>
        </div>
        <div class="rocket-container" id="rocket">
            <dotlottie-player id="lottie" src="4.json" background="transparent" speed="1" style="width: 100%; height: 100%;" loop autoplay></dotlottie-player>
        </div>
    </div>
    <div class="history" id="history-bar"></div>
    
    <div class="auto-controls">
        <label class="auto-checkbox" id="auto-bet-label">
            <input type="checkbox" id="auto-bet-cb">
            <span class="checkmark"></span>
            Автоставка
        </label>
        <label class="auto-checkbox" id="auto-cashout-label">
            <input type="checkbox" id="auto-cashout-cb">
            <span class="checkmark"></span>
            Автовывод
        </label>
    </div>

    <button class="bet-button" id="main-bet-btn">Сделать ставку</button>
    <div class="bets-label">
        <span>Ставки:</span>
        <span id="bet-count">0</span>
    </div>
    <div class="users-list" id="users-list"></div>
</div>

<div class="bottom-sheet-overlay" id="bet-sheet-overlay"></div>
<div class="bottom-sheet" id="bet-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Сделать ставку</div>
    <div class="bet-amount-card" id="sheet-amount-card">
        <div class="bet-amount-header" id="sheet-amount-header">
            <span id="sheet-amount-title">Сумма ставки</span>
            <span id="sheet-balance-label">Баланс: 0.00 TON</span>
        </div>
        <div style="display:flex; align-items:center;">
            <span id="sheet-prefix" style="display:none; font-size:30px; font-weight:800; color:#fff; margin-right:5px; margin-bottom:5px;">X</span>
            <input type="number" class="bet-amount-input" id="sheet-input" placeholder="0.00" step="0.01">
        </div>
        <div class="bet-amount-currency" id="sheet-currency">TON</div>
    </div>
    <div class="quick-amounts" id="sheet-quick-amounts">
        <button class="quick-btn" data-val="1">1 TON</button>
        <button class="quick-btn" data-val="20">20 TON</button>
        <button class="quick-btn" data-val="100">100 TON</button>
        <button class="quick-btn" data-val="1000">1000 TON</button>
    </div>
    <button class="sheet-submit-btn" id="sheet-submit-btn">Сделать ставку</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('#050505');
    tg.setBackgroundColor('#050505');

    // --- DOM элементы ---
    const counterEl = document.getElementById('counter');
    const rocketEl = document.getElementById('rocket');
    const loadingOverlay = document.getElementById('loading-overlay');
    const fillEl = document.getElementById('fill');
    const historyBar = document.getElementById('history-bar');
    const usersList = document.getElementById('users-list');
    const betCountEl = document.getElementById('bet-count');
    const onlineCountEl = document.getElementById('online-count');
    const mainBetBtn = document.getElementById('main-bet-btn');
    const headerBalanceEl = document.getElementById('header-balance');
    const sheetOverlay = document.getElementById('bet-sheet-overlay');
    const sheetEl = document.getElementById('bet-sheet');
    const sheetInput = document.getElementById('sheet-input');
    const sheetBalanceLabel = document.getElementById('sheet-balance-label');
    const sheetSubmitBtn = document.getElementById('sheet-submit-btn');
    const backButton = document.getElementById('back-button');

    const autoBetCb = document.getElementById('auto-bet-cb');
    const autoCashoutCb = document.getElementById('auto-cashout-cb');

    // --- Глобальные переменные ---
    let count = 1.00;
    let isWaiting = false;
    let activeHistoryItem = null;
    let allUsers = [];
    let currentGameLoop = null;

    let userBalance = parseFloat(localStorage.getItem('user_ton_balance')) || 0;
    if (isNaN(userBalance)) userBalance = 0.1;

    let initialUserBalance = parseFloat(localStorage.getItem('initial_ton_balance'));
    if (isNaN(initialUserBalance)) {
        initialUserBalance = userBalance;
        localStorage.setItem('initial_ton_balance', initialUserBalance);
    }

    let userBetAmount = 0;
    let isUserBetPlaced = false;
    let hasUserCashedOut = false;
    let userRowEl = null;
    let isBetQueued = false;
    let queuedBetAmount = 0;
    
    let forcedUserCrashPoint = null;

    let autoBetAmount = null;
    let autoCashoutMult = null;
    let sheetMode = 'bet';

    // --- Умная система (Казино всегда в плюсе) ---
    let userGamesPlayed = parseInt(localStorage.getItem('crash_games_played')) || 0;
    let lastUserOutcomes = [];
    let totalUserStaked = 0;
    let totalUserPayout = 0;
    
    let punishmentCrashesLeft = 0;
    let lagNextCashout = false;
    let consecutiveUserWins = parseInt(localStorage.getItem('crash_consecutive_wins')) || 0;
    let lastBetAmounts = JSON.parse(localStorage.getItem('crash_last_bets') || '[]');
    let isForcedCrashTick = false;

    function showToast(message, hasBtn = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        let html = `<span>${message}</span>`;
        if (hasBtn) html += `<a href="index.html" class="toast-btn">+</a>`;
        toast.innerHTML = html;
        document.getElementById('toast-container').appendChild(toast);
        void toast.offsetWidth;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    document.querySelector('.add-funds-btn').addEventListener('click', () => {
        showToast('Пополнить баланс можно в главном меню', true);
    });

    backButton.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    function updateBalanceUI() {
        localStorage.setItem('user_ton_balance', userBalance.toFixed(2));
        headerBalanceEl.innerText = userBalance.toFixed(2);
        sheetBalanceLabel.innerText = `Баланс: ${userBalance.toFixed(2)} TON`;
    }
    updateBalanceUI();

    function getSmartCrashMultiplier(betAmount) {
        lastBetAmounts.push(betAmount);
        if(lastBetAmounts.length > 5) lastBetAmounts.shift();
        localStorage.setItem('crash_last_bets', JSON.stringify(lastBetAmounts));

        // 1. Отработка наказаний (2 улета подряд на старте)
        if (punishmentCrashesLeft > 0) {
            punishmentCrashesLeft--;
            return 1.01 + Math.random() * 0.12; 
        }

        // 2. Анти-фарм низких иксов (забирает рано)
        let earlyCashouts = 0;
        for (let i = lastUserOutcomes.length - 1; i >= 0; i--) {
            if (lastUserOutcomes[i].won && lastUserOutcomes[i].cashedAt <= 1.35) earlyCashouts++;
            else break;
        }
        if (earlyCashouts >= 3) {
            punishmentCrashesLeft = 1; // Задаем 2 слива (1 сейчас, 1 в некст)
            return 1.02 + Math.random() * 0.08;
        }

        // 3. Лаг-механика (серия побед)
        if (consecutiveUserWins >= 2 && betAmount > 0.1) {
            lagNextCashout = true;
            return 15.0 + Math.random() * 20.0; // Летит долго, чтобы нажал и получил лаг
        }

        // 4. Защита баланса (казино всегда в плюсе)
        if (userBalance + (betAmount * 1.5) > initialUserBalance * 1.5) {
            return 1.01 + Math.random() * 0.25;
        }

        // 5. Резкое повышение ставки
        if (lastBetAmounts.length >= 3) {
            let avg = (lastBetAmounts[lastBetAmounts.length-2] + lastBetAmounts[lastBetAmounts.length-3]) / 2;
            if (betAmount >= avg * 1.8 && betAmount > 0.1) {
                return 1.03 + Math.random() * 0.20;
            }
        }

        // 6. Постоянные ставки
        let allSame = lastBetAmounts.length === 5 && lastBetAmounts.every(v => v === lastBetAmounts[0]);
        if (allSame) {
            return 1.1 + Math.random() * 0.3;
        }

        // 7. Маленькие ставки (даем выиграть, чтобы завлечь)
        if (betAmount <= 0.15) {
            return 1.8 + Math.random() * 3.5; 
        }

        // Стандартный рандом (в пользу казино)
        let r = Math.random();
        if(r < 0.5) return 1.1 + Math.random() * 0.45;
        if(r < 0.8) return 1.55 + Math.random() * 1.5;
        return 2.5 + Math.random() * 4.0;
    }

    function recordUserOutcome(won, multiplierAtCrash, cashoutMult = null) {
        const outcomeMult = cashoutMult !== null ? cashoutMult : multiplierAtCrash;
        lastUserOutcomes.push({ 
            won: won, 
            multiplier: outcomeMult,
            cashedAt: won ? outcomeMult : null
        });
        if (lastUserOutcomes.length > 6) lastUserOutcomes.shift();
        
        if (won) {
            totalUserPayout += userBetAmount * outcomeMult;
            consecutiveUserWins++;
        } else {
            consecutiveUserWins = 0;
            lagNextCashout = false;
        }
        localStorage.setItem('crash_consecutive_wins', consecutiveUserWins);
        
        userGamesPlayed++;
        localStorage.setItem('crash_games_played', userGamesPlayed);
    }

    function cashOutUser() {
        if (hasUserCashedOut) return;
        hasUserCashedOut = true;
        const winAmount = userBetAmount * count;
        userBalance = Math.round((userBalance + winAmount) * 100) / 100;
        updateBalanceUI();
        mainBetBtn.classList.remove('cashout-mode');
        mainBetBtn.innerText = "Сделать ставку";
        mainBetBtn.style.opacity = "1";
        mainBetBtn.style.transform = "none";
        
        if (userRowEl) {
            const profitDiv = document.getElementById('user-self-profit');
            profitDiv.innerHTML = `${winAmount.toFixed(2)} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
            profitDiv.classList.add('win-text');
        }
        recordUserOutcome(true, count, count);
    }

    const fallbackUsers = [
        {name: "#cry", color: "#FF5733"}, {name: "salomon AFK", color: "#F333FF"},
        {name: "secretively", color: "#0088cc"}, {name: "Лёша", color: "#33FF57"},
        {name: "😶", color: "#FFC300"}, {name: "Коля Демьянюк", color: "#006e0b"},
        {name: ".", color: "#C70039"}, {name: "Staff | #Coder", color: "#900C3F"},
        {name: "somenasvay | скупаю", color: "#0018ff"}, {name: "Roley Бро", color: "#11ff00"},
        {name: "Вадим", color: "#0081ff"}, {name: "NFT Fomo", color: "#ff1f00"},
        {name: "valeras", color: "#ff6afc"}, {name: "rayan", color: "#6aa2ff"},
        {name: "frad_bay☘️", color: "#b9ff00"}, {name: "REAPLY | ОБМЕН ₽/$", color: "#b095ff"},
        {name: "#𝗦𝘂𝗵𝗼𝗽𝗮𝘁", color: "#fff12a"}, {name: "Bublik/приму с лома/симок", color: "#6a8dff"},
    ];

    function getRandomBet() {
        const r = Math.random();
        if (r < 0.70) return (0.10 + Math.random() * 0.2).toFixed(2);
        return ["0.50", "1.00", "2.50", "5.00"].sort(() => Math.random() - 0.5)[0];
    }

    function getTargetMultiplierForBot() {
        const r = Math.random();
        if (r < 0.4) return 1.2 + Math.random() * 0.6;
        if (r < 0.8) return 2.0 + Math.random() * 2.5;
        return 5.0 + Math.random() * 10.0;
    }

    function updateOnline() {
        let currentOnline = parseInt(localStorage.getItem('fake_online')) || 26;
        const change = Math.random() > 0.5 ? 1 : -1;
        currentOnline += change;
        if (currentOnline < 20) currentOnline = 20;
        if (currentOnline > 35) currentOnline = 35;
        localStorage.setItem('fake_online', currentOnline);
        onlineCountEl.innerText = currentOnline;
    }

    setInterval(updateOnline, 10000);
    
    function initHistory() {
        for(let i=0; i<6; i++) {
            const val = (Math.random() * 2 + 1.1).toFixed(2);
            addHistoryItem(`x${val}`);
        }
    }

    function addHistoryItem(text, isActive = false) {
        const div = document.createElement('div');
        div.className = isActive ? 'hist-item active-now' : 'hist-item';
        div.innerText = text;
        historyBar.prepend(div);
        if(historyBar.children.length > 8) historyBar.lastChild.remove();
        return div;
    }

    function renderUserRow(user, bet, customTarget = null) {
        const row = document.createElement('div');
        row.className = 'user-row';
        const targetMult = customTarget !== null ? customTarget : getTargetMultiplierForBot();
        row.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar-small" style="background:${user.color || '#444'}">${user.name.charAt(0).toUpperCase()}</div>
                <div class="user-name">${user.name}</div>
            </div>
            <div class="user-profit" data-base-bet="${bet}">${bet} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon"></div>
        `;
        row.setAttribute('data-cashed', 'false');
        row.setAttribute('data-target', targetMult);
        row.setAttribute('data-base-bet', bet);
        usersList.appendChild(row);
        if (userRowEl) usersList.prepend(userRowEl);
    }

    function startWaiting(initialProgress = 0) {
        isWaiting = true;
        updateOnline();
        usersList.innerHTML = "";
        
        isUserBetPlaced = false;
        hasUserCashedOut = false;
        userBetAmount = 0;
        userRowEl = null;
        forcedUserCrashPoint = null;
        isForcedCrashTick = false;

        // --- ЛОГИКА АВТОСТАВКИ ---
        if (!isBetQueued && autoBetAmount !== null) {
            if (userBalance >= autoBetAmount) {
                userBalance = Math.round((userBalance - autoBetAmount) * 100) / 100;
                updateBalanceUI();
                isBetQueued = true;
                queuedBetAmount = autoBetAmount;
            } else {
                autoBetAmount = null;
                autoBetCb.checked = false;
                autoBetCb.parentElement.classList.remove('active-text');
                showToast('Автоставка отключена: недостаточно средств');
            }
        }

        if (isBetQueued) {
            isUserBetPlaced = true;
            userBetAmount = queuedBetAmount;
            isBetQueued = false;
            forcedUserCrashPoint = getSmartCrashMultiplier(userBetAmount);
            totalUserStaked += userBetAmount;
            
            userRowEl = document.createElement('div');
            userRowEl.className = 'user-row self-row';
            userRowEl.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="avatar-small" style="background:#32a6ff">ВЫ</div>
                    <div class="user-name">Вы</div>
                </div>
                <div class="user-profit" id="user-self-profit">${userBetAmount.toFixed(2)} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon"></div>
            `;
            usersList.prepend(userRowEl);
            mainBetBtn.innerText = "Ожидание игры...";
            mainBetBtn.classList.remove('cashout-mode');
            mainBetBtn.classList.add('disabled');
        } else {
            mainBetBtn.classList.remove('cashout-mode', 'disabled');
            mainBetBtn.innerText = "Сделать ставку";
        }
        
        sheetInput.value = "";
        betCountEl.innerText = isUserBetPlaced ? "1" : "0";
        counterEl.style.display = "none";
        rocketEl.style.display = "none";
        rocketEl.classList.remove('rocket-on-position', 'rocket-fly-away', 'rocket-active-pulse');
        loadingOverlay.style.display = "flex";

        let currentInList = 0;
        const totalBots = Math.floor(Math.random() * 5) + 3;
        const loadingDuration = 5000; 
        const startTime = Date.now() - (initialProgress / 100 * loadingDuration);
        
        let availableBots = [...allUsers];

        if (initialProgress > 0) {
            let botsToAdd = Math.floor(totalBots * (initialProgress / 100));
            for(let i=0; i<botsToAdd; i++) {
                if (availableBots.length > 0) {
                    let botIndex = Math.floor(Math.random() * availableBots.length);
                    let bot = availableBots.splice(botIndex, 1)[0];
                    renderUserRow(bot, getRandomBet());
                    currentInList++;
                }
            }
            betCountEl.innerText = isUserBetPlaced ? (currentInList + 1).toString() : currentInList.toString();
        }

        const scheduleBotEntry = () => {
            if (!isWaiting) return;
            const elapsed = Date.now() - startTime;
            if (elapsed >= loadingDuration) return;
            if (currentInList < totalBots) {
                setTimeout(() => {
                    if (!isWaiting) return;
                    if (availableBots.length > 0) {
                        let botIndex = Math.floor(Math.random() * availableBots.length);
                        let bot = availableBots.splice(botIndex, 1)[0];
                        renderUserRow(bot, getRandomBet());
                        currentInList++;
                        betCountEl.innerText = isUserBetPlaced ? currentInList + 1 : currentInList;
                    }
                    scheduleBotEntry();
                }, 100 + Math.random() * 700);
            }
        };
        scheduleBotEntry();

        let progress = initialProgress;
        fillEl.style.width = `${progress}%`;
        const intervalStep = 30;
        const incrementPerStep = 100 / (loadingDuration / intervalStep);
        const timer = setInterval(() => {
            progress += incrementPerStep;
            fillEl.style.width = `${Math.min(progress, 100)}%`;
            if (progress >= 100) {
                clearInterval(timer);
                startFlight(1.00);
            }
        }, intervalStep);
    }

    function startFlight(initialCount = 1.00) {
        isWaiting = false;
        count = initialCount;
        loadingOverlay.style.display = "none";
        counterEl.style.display = "block";
        counterEl.style.color = "white";
        rocketEl.style.display = "block";
        
        if (initialCount === 1.00) {
            setTimeout(() => rocketEl.classList.add('rocket-on-position'), 20);
            activeHistoryItem = addHistoryItem(`x1.00`, true);
        } else {
            rocketEl.classList.add('rocket-on-position');
            activeHistoryItem = addHistoryItem(`x${initialCount.toFixed(2)}`, true);
            const totalBots = Math.floor(Math.random() * 5) + 3;
            let availableBots = [...allUsers];
            for(let i=0; i<totalBots; i++) {
                if (availableBots.length > 0) {
                    let botIndex = Math.floor(Math.random() * availableBots.length);
                    let bot = availableBots.splice(botIndex, 1)[0];
                    renderUserRow(bot, getRandomBet());
                }
            }
            betCountEl.innerText = totalBots.toString();
        }
        
        if (isUserBetPlaced && !hasUserCashedOut) {
            mainBetBtn.classList.remove('disabled');
            mainBetBtn.classList.add('cashout-mode');
            mainBetBtn.innerText = `Забрать ${(userBetAmount * count).toFixed(2)} TON`;
        }

        // Рандомный полет ботов (чтобы игра не выглядела подкрученной)
        let highCrashLimit = 1.25 + Math.random() * 2.5;
        if (Math.random() > 0.6) highCrashLimit += Math.random() * 4; 
        if (initialCount > highCrashLimit) highCrashLimit = initialCount + Math.random() * 3;

        currentGameLoop = setInterval(() => {
            let crashNow = false;
            
            if (isForcedCrashTick) {
                crashNow = true;
                isForcedCrashTick = false;
            }
            else if (isUserBetPlaced && !hasUserCashedOut && forcedUserCrashPoint !== null) {
                if (count >= forcedUserCrashPoint) crashNow = true;
            }
            else if (!isUserBetPlaced || hasUserCashedOut) {
                if (count >= highCrashLimit) crashNow = true;
            }
            
            if (count >= 30.0) crashNow = true;

            // --- ЛОГИКА АВТОВЫВОДА ---
            if (!crashNow && isUserBetPlaced && !hasUserCashedOut && autoCashoutMult !== null) {
                if (count >= autoCashoutMult) {
                    if (lagNextCashout) {
                        // Лаг автовывода - руиним
                        lagNextCashout = false;
                        isForcedCrashTick = true;
                    } else {
                        cashOutUser();
                    }
                }
            }

            if (crashNow) {
                crash(currentGameLoop);
                return;
            }

            count += 0.006 * Math.pow(count, 0.85);
            counterEl.innerText = `x${count.toFixed(2)}`;
            if (activeHistoryItem) activeHistoryItem.innerText = `x${count.toFixed(2)}`;
            
            if (count >= 2.0 && !rocketEl.classList.contains('rocket-active-pulse')) {
                rocketEl.classList.add('rocket-active-pulse');
            }

            if (isUserBetPlaced && !hasUserCashedOut && userRowEl) {
                const currentPot = (userBetAmount * count).toFixed(2);
                document.getElementById('user-self-profit').innerHTML = `${currentPot} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
                if(!lagNextCashout || mainBetBtn.innerText.indexOf("Забрать") !== -1) {
                    mainBetBtn.innerText = `Забрать ${currentPot} TON`;
                }
            }

            const rows = document.querySelectorAll('.user-row:not(.self-row)');
            rows.forEach(row => {
                if (row.getAttribute('data-cashed') === 'true') return;
                const target = parseFloat(row.getAttribute('data-target'));
                const baseBet = parseFloat(row.getAttribute('data-base-bet'));
                const profitDiv = row.querySelector('.user-profit');
                if (count >= target) {
                    const win = (baseBet * target).toFixed(2);
                    profitDiv.innerHTML = `${win} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
                    profitDiv.classList.add('win-text');
                    row.setAttribute('data-cashed', 'true');
                } else {
                    profitDiv.innerHTML = `${(baseBet * count).toFixed(2)} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
                }
            });
        }, 30);
    }

    function crash(loop, isInitial = false) {
        if(loop) clearInterval(loop);
        counterEl.style.color = "#ff4444";
        rocketEl.classList.remove('rocket-active-pulse');
        
        mainBetBtn.style.opacity = "1";
        mainBetBtn.style.transform = "none";

        if (isInitial) {
            loadingOverlay.style.display = "none";
            counterEl.style.display = "block";
            rocketEl.style.display = "block";
            rocketEl.classList.add('rocket-fly-away');
            counterEl.innerText = `x${count.toFixed(2)}`;
        } else {
            setTimeout(() => rocketEl.classList.add('rocket-fly-away'), 20);
        }

        if (isUserBetPlaced && !hasUserCashedOut && userRowEl) {
            const profitDiv = document.getElementById('user-self-profit');
            profitDiv.innerHTML = `0.00 <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
            profitDiv.classList.add('lost-text');
            mainBetBtn.classList.remove('cashout-mode');
            mainBetBtn.innerText = "Сделать ставку";
            recordUserOutcome(false, count);
        }

        const rows = document.querySelectorAll('.user-row:not(.self-row)');
        rows.forEach(row => {
            if (row.getAttribute('data-cashed') === 'true') return;
            const profitDiv = row.querySelector('.user-profit');
            profitDiv.innerHTML = `0.00 <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon">`;
            profitDiv.classList.add('lost-text');
            row.setAttribute('data-cashed', 'true');
        });

        if (activeHistoryItem) {
            activeHistoryItem.classList.remove('active-now');
            activeHistoryItem.innerText = `x${count.toFixed(2)}`;
            activeHistoryItem = null;
        } else if (isInitial) {
            addHistoryItem(`x${count.toFixed(2)}`);
        }
        
        let waitTime = isInitial ? Math.random() * 2000 : 2500;
        setTimeout(() => {
            startWaiting(0);
        }, waitTime);
    }

    function openSheet(mode) {
        sheetMode = mode;
        const sTitle = document.querySelector('.sheet-title');
        const sCurrency = document.getElementById('sheet-currency');
        const sHeader = document.getElementById('sheet-amount-header');
        const sQuick = document.getElementById('sheet-quick-amounts');
        const sPrefix = document.getElementById('sheet-prefix');
        const sAmountTitle = document.getElementById('sheet-amount-title');

        sPrefix.style.display = 'none';
        sCurrency.style.display = 'block';
        sHeader.style.display = 'flex';
        sQuick.style.display = 'flex';

        if(mode === 'bet') {
            sTitle.innerText = "Сделать ставку";
            sCurrency.innerText = "TON";
            sAmountTitle.innerText = "Сумма ставки";
            sheetSubmitBtn.innerText = "Сделать ставку";
            sheetInput.placeholder = "0.00";
        } else if (mode === 'autobet') {
            sTitle.innerText = "Настройка Автоставки";
            sCurrency.innerText = "TON";
            sAmountTitle.innerText = "Сумма автоставки";
            sheetSubmitBtn.innerText = "Сохранить";
            sheetInput.placeholder = "0.00";
        } else if (mode === 'autocashout') {
            sTitle.innerText = "Настройка Автовывода";
            sHeader.style.display = 'none';
            sQuick.style.display = 'none';
            sCurrency.style.display = 'none';
            sPrefix.style.display = 'block';
            sheetSubmitBtn.innerText = "Сохранить";
            sheetInput.placeholder = "2.00";
        }
        sheetInput.value = "";
        
        sheetOverlay.style.display = 'block';
        setTimeout(() => {
            sheetOverlay.style.opacity = '1';
            sheetEl.classList.add('open');
        }, 10);
    }

    autoBetCb.addEventListener('change', () => {
        if (autoBetCb.checked) {
            autoBetCb.checked = false;
            openSheet('autobet');
        } else {
            autoBetAmount = null;
            autoBetCb.parentElement.classList.remove('active-text');
            showToast('Автоставка отключена');
        }
    });

    autoCashoutCb.addEventListener('change', () => {
        if (autoCashoutCb.checked) {
            autoCashoutCb.checked = false;
            openSheet('autocashout');
        } else {
            autoCashoutMult = null;
            autoCashoutCb.parentElement.classList.remove('active-text');
            showToast('Автовывод отключен');
        }
    });

    sheetSubmitBtn.addEventListener('click', () => {
        let val = parseFloat(sheetInput.value);
        if (isNaN(val) || val <= 0) return;
        
        if (sheetMode === 'bet' || sheetMode === 'autobet') {
            if (val > userBalance + 0.0001) {
                showToast('Недостаточно средств');
                return;
            }
        }

        closeSheet();

        if (sheetMode === 'bet') {
            userBalance = Math.round((userBalance - val) * 100) / 100;
            updateBalanceUI();
            
            if (isWaiting) {
                userBetAmount = val;
                isUserBetPlaced = true;
                hasUserCashedOut = false;
                forcedUserCrashPoint = getSmartCrashMultiplier(val);
                userRowEl = document.createElement('div');
                userRowEl.className = 'user-row self-row';
                userRowEl.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div class="avatar-small" style="background:#32a6ff">ВЫ</div>
                        <div class="user-name">Вы</div>
                    </div>
                    <div class="user-profit" id="user-self-profit">${val.toFixed(2)} <img src="https://i.ibb.co/wrRvxTzd/Gram-cryptocurrency-logo-svg.png" class="ton-mini-icon"></div>
                `;
                usersList.prepend(userRowEl);
                mainBetBtn.innerText = "Ожидание игры...";
                mainBetBtn.classList.add('disabled');
            } else {
                isBetQueued = true;
                queuedBetAmount = val;
                mainBetBtn.innerText = "Ожидание игры...";
                mainBetBtn.classList.add('disabled');
            }
        } else if (sheetMode === 'autobet') {
            autoBetAmount = val;
            autoBetCb.checked = true;
            autoBetCb.parentElement.classList.add('active-text');
            showToast(`Автоставка ${val.toFixed(2)} TON включена`);
        } else if (sheetMode === 'autocashout') {
            if (val < 1.01) val = 1.01;
            autoCashoutMult = val;
            autoCashoutCb.checked = true;
            autoCashoutCb.parentElement.classList.add('active-text');
            showToast(`Автовывод на x${val.toFixed(2)} включен`);
        }
    });

    function closeSheet() {
        sheetEl.classList.remove('open');
        sheetOverlay.style.opacity = '0';
        setTimeout(() => { sheetOverlay.style.display = 'none'; }, 400);
    }
    sheetOverlay.addEventListener('click', closeSheet);

    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            sheetInput.value = parseFloat(e.target.getAttribute('data-val')).toFixed(2);
        });
    });

    mainBetBtn.addEventListener('click', () => {
        if (mainBetBtn.classList.contains('disabled')) return;
        
        if (!isWaiting && isUserBetPlaced && !hasUserCashedOut) {
            if (lagNextCashout) {
                // Имитация зависания кнопки и моментальный краш
                mainBetBtn.innerText = "";
                mainBetBtn.style.transform = "scale(0.96)";
                mainBetBtn.style.opacity = "0.7";
                
                setTimeout(() => {
                    lagNextCashout = false;
                    isForcedCrashTick = true;
                }, 350 + Math.random() * 400);
                return;
            }
            cashOutUser();
        } else if (!isBetQueued) {
            openSheet('bet');
        }
    });

    async function loadUsers() {
        allUsers = [...fallbackUsers];
    }

    async function initWithRandomState() {
        await loadUsers();
        initHistory();

        const randPhase = Math.random();
        if (randPhase < 0.33) {
            startWaiting(Math.random() * 100);
        } else if (randPhase < 0.66) {
            const initialCount = 1.0 + Math.random() * 2.0;
            startFlight(initialCount);
        } else {
            count = 1.0 + Math.random() * 5.0; 
            crash(null, true);
        }
    }

    initWithRandomState();
</script>
